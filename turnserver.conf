# Coturn configuration for NetBird P2P handshake support
# Coturn is only used as a fallback TURN relay when two peers are behind
# symmetric NAT and cannot establish a direct WireGuard connection.
# In most cases (home router + mobile) direct P2P succeeds and Coturn is idle.

# Listening ports
listening-port=3478
tls-listening-port=5349

# Use the VPS public IP (coturn auto-detects if left blank, but explicit is safer)
# external-ip=YOUR_VPS_PUBLIC_IP

# Credentials — must match TURN_SECRET in .env
use-auth-secret
static-auth-secret=${TURN_SECRET}

# Realm
realm=netbird.selfhosted

# Disable outdated protocols
no-tlsv1
no-tlsv1_1

# Log to stdout (docker picks it up)
log-file=stdout
simple-log

# Relay port range (open these in your VPS firewall)
min-port=49152
max-port=65535

# Disable non-TURN endpoints (only act as a relay, not a generic STUN server)
no-stun
